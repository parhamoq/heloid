<!DOCTYPE html>
<html lang="fa" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت در دسترس نیست | گاز هوشمند</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ink: '#0A0E13',
                        surface: '#111823',
                        flame: { DEFAULT: '#FF7A45', soft: '#FFB020', deep: '#E14F2A' },
                        volt: { DEFAULT: '#22D6C8', soft: '#7EE8DE' },
                        mist: '#8A97A3',
                        paper: '#F4F7F9'
                    },
                    fontFamily: {
                        vazir: ['Vazirmatn', 'sans-serif']
                    },
                    boxShadow: {
                        glow: '0 0 40px rgba(255,122,69,.25)'
                    }
                }
            }
        }
    </script>

    <style>
        :root { color-scheme: dark; }
        body { overflow: hidden; }

        .text-gradient-flame {
            background: linear-gradient(90deg, #FFB020, #FF5A3C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .bg-circuit {
            background-image:
                radial-gradient(circle at 15% 15%, rgba(34,214,200,.08), transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(255,122,69,.08), transparent 42%),
                linear-gradient(#0A0E13, #0A0E13);
        }
    </style>
</head>
<body class="font-vazir bg-ink text-paper antialiased h-screen flex items-center justify-center relative px-4">

    <div class="absolute inset-0 -z-10 bg-circuit"></div>

    <div class="text-center max-w-xl w-full bg-surface/40 backdrop-blur-xl border border-white/5 p-8 sm:p-12 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
        
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-flame-soft to-flame-deep shadow-glow mb-8 animate-pulse">
            <svg class="w-8 h-8 text-ink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 21c-3.5 0-6-2.5-6-6 0-3 2-5 3-8 .5 2 2 3 2 5 0-2 2-3 2-6 3 2 5 5 5 9 0 3.5-2.5 6-6 6z"/>
            </svg>
        </div>

        <h1 class="text-2xl sm:text-4xl font-black text-white leading-relaxed mb-4">
            سایت درحال حاضر در دسترس <span class="text-gradient-flame">نیست</span>
        </h1>
        
        <p class="text-sm sm:text-base text-mist leading-loose font-medium max-w-md mx-auto">با این حال می‌توانید از گیتهاب استفاده کنید.</p>

        <div class="mt-8 pt-6 border-t border-white/5">
            <a href="https://survey.porsline.ir/s/zE5WAvbq" class="inline-flex items-center text-xs font-bold text-volt hover:text-volt-soft transition-colors tracking-wide bg-volt/5 hover:bg-volt/10 px-6 py-3 rounded-xl border border-volt/10">
            دریافت لیک گیتهاب پروژه
            </a>
        </div>

    </div>

</body>
</html>
